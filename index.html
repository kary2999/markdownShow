<!DOCTYPE html>
<html lang="zh-CN" data-mdviewer-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Show · 拖拽即渲染</title>
    <meta
      name="description"
      content="在浏览器里直接把 Markdown 拖进来即渲染：代码高亮、目录、亮/暗主题、Mermaid。可装到桌面像 App 一样打开。"
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0969da" />
    <link rel="icon" href="icons/icon128.png" />
    <link rel="apple-touch-icon" href="icons/icon128.png" />

    <link id="mdv-hljs-light" rel="stylesheet" href="lib/hljs-light.css" />
    <link id="mdv-hljs-dark" rel="stylesheet" href="lib/hljs-dark.css" disabled />
    <link rel="stylesheet" href="app.css?v=7" />
  </head>
  <body>
    <div id="mdv-toolbar">
      <button id="mdv-open-btn" title="打开 .md 文件">📂 打开</button>
      <button id="mdv-refresh-btn" title="重新加载当前文档">🔄 刷新</button>
      <button id="mdv-theme-btn" title="切换主题">🌓</button>
    </div>

    <!-- 多文档 Tab 栏 -->
    <div id="mdv-tabs" hidden></div>

    <!-- 落地页 / 空状态 -->
    <div id="mdv-landing">
      <div class="mdv-landing-card">
        <div class="mdv-logo">📄</div>
        <h1>Markdown Show</h1>
        <p>把 <code>.md</code> 文件拖到这里，即刻渲染。</p>
        <button id="mdv-landing-open">选择文件</button>
        <ul class="mdv-features">
          <li>✨ 代码高亮</li>
          <li>🧭 目录 TOC</li>
          <li>🌓 亮/暗主题</li>
          <li>📊 Mermaid 图表</li>
        </ul>
      </div>
    </div>

    <!-- 渲染区域 -->
    <div id="mdv-layout" hidden>
      <nav id="mdv-toc" aria-label="目录"></nav>
      <main id="mdv-content" class="markdown-body"></main>
    </div>

    <!-- 拖拽遮罩 -->
    <div id="mdv-drop-overlay">松开以渲染 Markdown 文件</div>

    <input
      id="mdv-file-input"
      type="file"
      accept=".md,.markdown,.mdown,.mkd,.mdx,.txt,text/plain,text/markdown"
      multiple
      hidden
    />

    <script src="lib/marked.min.js"></script>
    <script src="lib/purify.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <script src="lib/mermaid.min.js"></script>
    <script src="app.js?v=7"></script>
  </body>
</html>
